<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Add Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<script th:src="@{/js/script.js}"></script>
</head>

<body>
<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a class="navbar-brand">RevPasswordManager</a>

<div>

<a href="/dashboard" class="btn btn-light btn-sm">📊 Dashboard</a>
<a href="/vault" class="btn btn-light btn-sm">🔐 Vault</a>
<a href="/generator" class="btn btn-light btn-sm">🔑 Generator</a>
<a href="/backup" class="btn btn-light btn-sm">💾 Backup</a>
<a href="/security-report" class="btn btn-light btn-sm">🛡 Security</a>

</div>

</div>

</nav>

<div class="container mt-4">

<h2>Add Password</h2>

<form th:action="@{/vault/save}" method="post">

<input class="form-control mb-3" name="accountName" placeholder="Account Name">

<input class="form-control mb-3" name="websiteUrl" placeholder="Website URL">

<input class="form-control mb-3" name="usernameOrEmail" placeholder="Username">

<input class="form-control mb-3" name="password" placeholder="Password">

<input class="form-control mb-3" name="category" placeholder="Category">

<button class="btn btn-primary">Save</button>

</form>

</div>

</body>

</html>
