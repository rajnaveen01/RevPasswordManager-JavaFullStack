<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4" style="max-width:500px;margin:auto">

<h3 class="text-center">Forgot Password</h3>

<input id="username" class="form-control mt-3" placeholder="Enter Username">

<button onclick="loadQuestions()" class="btn btn-primary w-100 mt-3">
Load Security Questions
</button>

<div id="questionsSection" class="mt-4"></div>

</div>

</div>

<script>

function loadQuestions(){

const username = document.getElementById("username").value;


fetch("/api/security/questions/username/"+username)

.then(res => res.json())

.then(data => {

let html = "";

data.forEach((q,i)=>{

	html += `
	<p>${q}</p>
	<input id="ans${i}" class="form-control mb-3" placeholder="Enter Answer">
	`;

	});

html += `<button class="btn btn-success w-100" onclick="verifyAnswers()">Verify Answers</button>`;

document.getElementById("questionsSection").innerHTML = html;

});

}

function verifyAnswers(){

	const username = document.getElementById("username").value;

	const data = {

	username: username,
	answer1: document.getElementById("ans0").value,
	answer2: document.getElementById("ans1").value,
	answer3: document.getElementById("ans2").value,
	newPassword: prompt("Enter new master password")

	};

	fetch("/api/security/verify-answers",{

	method:"POST",
	headers:{
	"Content-Type":"application/json"
	},
	body:JSON.stringify(data)

	})

	.then(res => res.text())
	.then(msg=>{
	alert(msg);
	window.location.href="/login";
	});

	}

</script>

</body>
</html>
